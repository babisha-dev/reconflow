# ──────────────────────────────────────────────
# Smart Reconciliation & Audit System
# ──────────────────────────────────────────────
server.port=8080

# MySQL — XAMPP (default root, no password)
spring.datasource.url=jdbc:mysql://localhost:3306/smart_reconciliation?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File uploads — support up to 100 MB
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# JWT
jwt.secret=SmartReconciliationSuperSecretKeyForHS256MustBe32CharsMin2024
jwt.expiration=86400000

# Async thread pool
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Reconciliation rules (configurable — no hardcoding)
reconciliation.amount-variance-percentage=2.0
