# ──────────────────────────────────────────────
# Smart Reconciliation & Audit System
# ──────────────────────────────────────────────
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# File uploads — support up to 100 MB
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# JWT
jwt.secret=SmartReconciliationSuperSecretKeyForHS256MustBe32CharsMin2024
jwt.expiration=86400000

# Async thread pool
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Reconciliation rules (configurable — no hardcoding)
reconciliation.amount-variance-percentage=2.0
